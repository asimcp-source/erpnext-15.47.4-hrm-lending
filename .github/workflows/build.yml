name: Build ERPNext Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # This 'driver-opts' line fixes the DNS issues in some environments
          driver-opts: network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/erpnext-custom:latest
          # This converts your apps.json into the base64 string Frappe's Dockerfile needs
          build-args: |
            APPS_JSON_BASE64=${{ base64_encode(file.read('apps.json')) }}
          # Fixes the 'failed to solve' cache errors
          cache-from: type=gha
          cache-to: type=gha,mode=max
