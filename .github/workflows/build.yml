name: Build ERPNext Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Converts your apps.json into the Base64 format Frappe needs
      - name: Encode apps.json to Base64
        id: encode_json
        run: |
          if [ ! -f "apps.json" ]; then
            echo "❌ apps.json not found in root!"
            exit 1
          fi
          ENCODED=$(base64 -w 0 apps.json)
          echo "apps_base64=$ENCODED" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Force pull fresh metadata to fix "not found" errors
          pull: true
          # provenance: false prevents common metadata/attestation errors
          provenance: false
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/erpnext-custom:latest
          build-args: |
            APPS_JSON_BASE64=${{ steps.encode_json.outputs.apps_base64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
