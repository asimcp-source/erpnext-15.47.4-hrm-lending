name: Build ERPNext Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # This removes the warning by opting into the newer Node.js 24 runtime
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Encode apps.json to Base64
        id: encode_json
        run: |
          if [ ! -f "apps.json" ]; then
            echo "❌ apps.json not found!"
            exit 1
          fi
          ENCODED=$(base64 -w 0 apps.json)
          echo "apps_base64=$ENCODED" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/erpnext-custom:latest
          build-args: |
            APPS_JSON_BASE64=${{ steps.encode_json.outputs.apps_base64 }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
